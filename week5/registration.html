<html>

<body bgcolor="lavender">

    <h1 align="center">Job</h1>

    <form>
        <table align="center" cellpadding="10">

            <tr>
                <td>Username</td>
                <td><input type="text" id="1" placeholder="enter your name"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="text" id="2" placeholder="enter your email"></td>
            </tr>

            <tr>
                <td>Number</td>
                <td><input type="number" id="3" placeholder="enter your number"></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="button" value="Submit" onclick="return validate()">
                </td>
            </tr>

        </table>
    </form>

    <script>
        function validate() {
            var un = document.getElementById("1");
            var em = document.getElementById("2");
            var m = document.getElementById("3");
            var uname = un.value;
            var email = em.value;
            var mobile = m.value;
            var unre = /^[a-zA-Z]+[0-9a-zA-Z._]*$/;
            var ere = /^[a-zA-Z]+([\._]?\w+)*@\w+([\._]?\w+)*(\.\w{2,3})+$/;
            var mre = /^[6-9][0-9]{9}$/;

            if (unre.test(uname)) {
                if (ere.test(email)) {
                    if (mre.test(mobile)) {
                        alert("registered successfully");
                        return true;
                    }
                    else {
                        return error(m);
                    }
                }
                else {
                    return error(em);
                }
            }
            else {
                return error(un);
            }
        }

        function error(ele) {
            alert("invalid");
            ele.style.border = "3px solid red";
            ele.value = "";
            ele.placeholder = "invalid";
            ele.focus();
            return false;
        }
    </script>

    <h1 align="right">SUSHMITHA</h1>
    <h1 align="right">24881A1210</h1>

</body>

</html>
